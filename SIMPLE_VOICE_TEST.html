<!DOCTYPE html>
<html>
<head>
    <title>Simple Voice Test</title>
    <style>
        body { font-family: Arial; padding: 40px; }
        button { padding: 15px 30px; font-size: 16px; cursor: pointer; }
        #output { margin-top: 20px; padding: 20px; background: #f0f0f0; min-height: 100px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🎤 Simple Voice Recognition Test</h1>
    <button onmousedown="startRec()" onmouseup="stopRec()">Hold Button & Speak</button>
    <div id="output">
        <p>Hold the button above and speak. Your text will appear here.</p>
        <p id="status"></p>
        <p id="result"></p>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                console.log('✓ Recognition started');
                document.getElementById('status').innerHTML = '<span style="color: green; font-weight: bold;">🎙️ LISTENING...</span>';
            };

            recognition.onresult = (event) => {
                let finalText = '';
                let interimText = '';
                
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const text = event.results[i][0].transcript;
                    console.log(`[${i}]`, text, event.results[i].isFinal ? '(FINAL)' : '(interim)');
                    
                    if (event.results[i].isFinal) {
                        finalText += text + ' ';
                    } else {
                        interimText += text;
                    }
                }
                
                document.getElementById('result').innerHTML = 
                    '<strong>Final:</strong> ' + (finalText || '(waiting...)') + '<br>' +
                    '<strong>Interim:</strong> ' + interimText;
            };

            recognition.onerror = (event) => {
                console.error('❌ Error:', event.error);
                document.getElementById('status').innerHTML = '<span style="color: red; font-weight: bold;">❌ ERROR: ' + event.error + '</span>';
            };

            recognition.onend = () => {
                console.log('Recognition ended');
                document.getElementById('status').innerHTML = '<span style="color: blue;">⏹️ Stopped listening</span>';
            };
        } else {
            document.getElementById('output').innerHTML = '<span style="color: red; font-weight: bold;">❌ Speech Recognition NOT SUPPORTED</span>';
        }

        function startRec() {
            if (recognition) {
                try {
                    recognition.start();
                } catch (e) {
                    console.log('Already started');
                }
            }
        }

        function stopRec() {
            if (recognition) {
                recognition.stop();
            }
        }
    </script>
</body>
</html>
