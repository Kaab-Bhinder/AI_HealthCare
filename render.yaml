# Render.com blueprint — deploys the Flask backend as a web service.
# Dashboard: New + -> Blueprint -> pick this repo.
services:
  - type: web
    name: auravia-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 120
    envVars:
      - key: GEMINI_API_KEY
        sync: false            # paste in dashboard
      - key: MONGODB_URI
        sync: false            # your Atlas mongodb+srv:// URI
      - key: MONGODB_DB
        value: auravia
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false            # your Vercel URL, e.g. https://auravia.vercel.app
      - key: ADMIN_EMAIL
        value: admin@auravia.health
      - key: ADMIN_PASSWORD
        sync: false
      - key: RAG_RELEVANCE_THRESHOLD
        value: "0.78"
      - key: PYTHON_VERSION
        value: "3.12"
